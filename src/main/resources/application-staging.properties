#server
server.port=${SERVER_PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=always

#Datasource
spring.datasource.url=jdbc:h2:file:./data/authdb_staging;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USER:staging}
spring.datasource.password=${DB_PASS:staging}

#H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

#Mail
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

logging.level.com.enterprise.auth=INFO
logging.level.org.springframework.security=WARN

