app.name=Pooler Service
app.version=1.0.0
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.jwt.secret=${JWT_SECRET:5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:900000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}
app.jwt.session-token-expiry-ms=${JWT_SESSION_EXPIRY:1800000}
app.jwt.issuer=enterprise-auth
app.jwt.audience=enterprise-mobile-app
app.password-reset.token-expiry-minutes=30
app.password-reset.max-attempts=3
app.mail.from=${MAIL_FROM:noreply@enterprise.com}
app.mail.from-name=${MAIL_FROM_NAME:Enterprise Auth}
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=30
app.security.bcrypt-strength=12
app.security.cors.allowed-origins=${CORS_ORIGINS:*}
app.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH


#Metrics
management.endpoints.web.exposure.include=health,info,metrics


#Spring doc
