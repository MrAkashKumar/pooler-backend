server.port=8080

#Datasource
spring.datasource.url=jdbc:h2:mem:authdb_dev;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=null

#H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

#Mail
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME:dev}
spring.mail.password=${MAIL_PASSWORD:dev}

app.jwt.access-token-expiry-ms=3600000
app.security.bcrypt-strength=4

logging.level.com.enterprise.auth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


server.error.include-stacktrace=always
server.error.include-message=always
