<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Account Security Alert</title>
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f7fa;margin:0;padding:40px 20px}
        .card{background:#fff;border-radius:12px;max-width:520px;margin:auto;padding:40px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
        .logo{font-size:22px;font-weight:700;color:#4f46e5;margin-bottom:24px}
        .alert{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:16px 0}
        h1{font-size:24px;color:#dc2626;margin:0 0 12px}
        p{color:#555;line-height:1.6;margin:0 0 16px}
        .footer{margin-top:32px;font-size:12px;color:#999;text-align:center}
    </style>
</head>
<body>
<div class="card">
    <div class="logo" th:text="${appName}">Pooler</div>
    <h1>🔒 Account Locked</h1>
    <p>Hi <strong th:text="${userName}">User</strong>,</p>
    <div class="alert">
        Your account has been temporarily locked due to multiple failed login attempts.
        It will be automatically unlocked after <strong th:text="${lockMinutes}">30</strong> minutes.
    </div>
    <p>If this wasn't you, your account may be under attack. Please contact support immediately:</p>
    <p><strong><a th:href="${'mailto:' + supportEmail}" th:text="${supportEmail}">support@pooler.com</a></strong></p>
    <div class="footer">
        &copy; <span th:text="${appName}">Pooler</span>
    </div>
</div>
</body>
</html>
