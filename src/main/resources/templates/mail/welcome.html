<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f7fa;margin:0;padding:40px 20px}
        .card{background:#fff;border-radius:12px;max-width:520px;margin:auto;padding:40px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
        .logo{font-size:22px;font-weight:700;color:#4f46e5;margin-bottom:24px}
        h1{font-size:24px;color:#1a1a2e;margin:0 0 12px}
        p{color:#555;line-height:1.6;margin:0 0 16px}
        .btn{display:inline-block;background:#4f46e5;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;margin:8px 0 24px}
        .footer{margin-top:32px;font-size:12px;color:#999;text-align:center}
        .feature{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:14px;color:#444}
    </style>
</head>
<body>
<div class="card">
    <div class="logo" th:text="${appName}">Pooler</div>
    <h1>Welcome aboard, <span th:text="${userName}">User</span>! 🎉</h1>
    <p>Your account has been created successfully. You're now part of our platform.</p>
    <div class="feature">✅ Secure JWT-based authentication</div>
    <div class="feature">✅ Multi-device session management</div>
    <div class="feature">✅ Role-based access control</div>
    <br>
    <a class="btn" th:href="${loginLink}">Get Started</a>
    <div class="footer">
        &copy; <span th:text="${appName}">Pooler</span>
    </div>
</div>
</body>
</html>
