# ══════════════════════════════════════════════════════
#  Docker Compose — Pooler-backend
#  Profiles: dev (default), staging
# ══════════════════════════════════════════════════════
version: '3.9'

services:

  # ── Auth Service ──────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: pooler/pooler-backend:1.0.0
    container_name: pooler-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:-5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      MAIL_USERNAME: ${MAIL_USERNAME:-dev}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-dev}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - auth-data:/app/data    # H2 file DB persistence
    networks:
      - pooler-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Mailhog (local mail catcher) ──────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: pooler-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI → http://localhost:8025
    networks:
      - pooler-network
    profiles:
      - dev

volumes:
  auth-data:
    driver: local

networks:
  auth-network:
    driver: bridge
